<svg width="1800" height="1200" viewBox="0 0 1800 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3F7FB"/>
      <stop offset="1" stop-color="#FCFDFE"/>
    </linearGradient>
    <linearGradient id="header" x1="80" y1="48" x2="1720" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B4263"/>
      <stop offset="1" stop-color="#12819A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0F2940" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 38px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: white; }
      .subtitle { font: 400 18px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #DDF4FB; }
      .group-title { font: 700 22px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #153047; }
      .box-title { font: 700 20px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #13283A; }
      .field { font: 400 15px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #4B6175; }
      .caption { font: 600 14px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #4D6980; }
      .badge { font: 700 13px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #0C4E73; }
      .small { font: 600 12px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; fill: #5A7388; }
    </style>
  </defs>

  <rect width="1800" height="1200" rx="0" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="56" y="40" width="1688" height="132" rx="28" fill="url(#header)"/>
  </g>
  <text x="96" y="96" class="title">AI 기반 개인 수하물 사전 검사 시스템 ERD</text>
  <text x="96" y="132" class="subtitle">항공사 규정 크롤링 → 규정 정규화 → 품목 판정 → 사용자 분석 결과 저장까지를 반영한 발표용 데이터 모델</text>

  <text x="72" y="230" class="group-title">1. 항공사 및 규정 수집 영역</text>
  <text x="648" y="230" class="group-title">2. 품목 분류 및 규정 엔진 영역</text>
  <text x="1248" y="230" class="group-title">3. 사용자 분석 및 판정 결과 영역</text>

  <g filter="url(#shadow)">
    <rect x="64" y="258" width="260" height="170" rx="24" fill="white"/>
  </g>
  <text x="88" y="298" class="box-title">AIRLINE</text>
  <text x="88" y="326" class="badge">항공사 기본 정보</text>
  <text x="88" y="356" class="field">PK airline_id</text>
  <text x="88" y="380" class="field">iata_code, icao_code</text>
  <text x="88" y="404" class="field">name_ko, name_en</text>

  <g filter="url(#shadow)">
    <rect x="64" y="470" width="260" height="182" rx="24" fill="white"/>
  </g>
  <text x="88" y="510" class="box-title">ROUTE_POLICY_SCOPE</text>
  <text x="88" y="538" class="badge">노선/좌석/기간별 규정 범위</text>
  <text x="88" y="568" class="field">PK scope_id</text>
  <text x="88" y="592" class="field">FK airline_id</text>
  <text x="88" y="616" class="field">departure_airport_id</text>
  <text x="88" y="640" class="field">arrival_airport_id</text>

  <g filter="url(#shadow)">
    <rect x="64" y="694" width="260" height="190" rx="24" fill="white"/>
  </g>
  <text x="88" y="734" class="box-title">BAGGAGE_RULESET</text>
  <text x="88" y="762" class="badge">정규화된 규정 버전</text>
  <text x="88" y="792" class="field">PK ruleset_id</text>
  <text x="88" y="816" class="field">FK airline_id, scope_id</text>
  <text x="88" y="840" class="field">ruleset_version</text>
  <text x="88" y="864" class="field">source_url, crawled_at</text>

  <g filter="url(#shadow)">
    <rect x="64" y="926" width="260" height="170" rx="24" fill="white"/>
  </g>
  <text x="88" y="966" class="box-title">RULE_SOURCE_SNAPSHOT</text>
  <text x="88" y="994" class="badge">크롤링 원문 보관</text>
  <text x="88" y="1024" class="field">PK snapshot_id</text>
  <text x="88" y="1048" class="field">FK ruleset_id</text>
  <text x="88" y="1072" class="field">raw_text, checksum</text>

  <g filter="url(#shadow)">
    <rect x="640" y="258" width="260" height="170" rx="24" fill="white"/>
  </g>
  <text x="664" y="298" class="box-title">ITEM_CATEGORY</text>
  <text x="664" y="326" class="badge">품목 카테고리 계층</text>
  <text x="664" y="356" class="field">PK category_id</text>
  <text x="664" y="380" class="field">parent_category_id</text>
  <text x="664" y="404" class="field">code, name_ko, name_en</text>

  <g filter="url(#shadow)">
    <rect x="640" y="470" width="260" height="182" rx="24" fill="white"/>
  </g>
  <text x="664" y="510" class="box-title">ITEM</text>
  <text x="664" y="538" class="badge">정규화된 판정 대상 품목</text>
  <text x="664" y="568" class="field">PK item_id</text>
  <text x="664" y="592" class="field">FK category_id</text>
  <text x="664" y="616" class="field">canonical_name_ko/en</text>
  <text x="664" y="640" class="field">hazard_type</text>

  <g filter="url(#shadow)">
    <rect x="640" y="694" width="260" height="170" rx="24" fill="white"/>
  </g>
  <text x="664" y="734" class="box-title">ITEM_ALIAS</text>
  <text x="664" y="762" class="badge">동의어/표현 통합</text>
  <text x="664" y="792" class="field">PK alias_id</text>
  <text x="664" y="816" class="field">FK item_id</text>
  <text x="664" y="840" class="field">alias_text, language_code</text>

  <g filter="url(#shadow)">
    <rect x="640" y="906" width="260" height="190" rx="24" fill="white"/>
  </g>
  <text x="664" y="946" class="box-title">ITEM_ATTRIBUTE_SCHEMA</text>
  <text x="664" y="974" class="badge">조건 판정 속성 정의</text>
  <text x="664" y="1004" class="field">PK attribute_id</text>
  <text x="664" y="1028" class="field">attribute_code</text>
  <text x="664" y="1052" class="field">value_type, unit</text>

  <g filter="url(#shadow)">
    <rect x="948" y="362" width="260" height="200" rx="24" fill="white"/>
  </g>
  <text x="972" y="402" class="box-title">RULE_ITEM_POLICY</text>
  <text x="972" y="430" class="badge">품목별 기본 규정</text>
  <text x="972" y="460" class="field">PK policy_id</text>
  <text x="972" y="484" class="field">FK ruleset_id, item_id</text>
  <text x="972" y="508" class="field">carry_on_result</text>
  <text x="972" y="532" class="field">checked_result, overall_result</text>

  <g filter="url(#shadow)">
    <rect x="948" y="640" width="260" height="200" rx="24" fill="white"/>
  </g>
  <text x="972" y="680" class="box-title">RULE_ITEM_CONDITION</text>
  <text x="972" y="708" class="badge">용량/속성별 조건식</text>
  <text x="972" y="738" class="field">PK condition_id</text>
  <text x="972" y="762" class="field">FK policy_id, attribute_id</text>
  <text x="972" y="786" class="field">operator, value_number</text>
  <text x="972" y="810" class="field">result_override</text>

  <g filter="url(#shadow)">
    <rect x="1240" y="258" width="260" height="190" rx="24" fill="white"/>
  </g>
  <text x="1264" y="298" class="box-title">USER_SCAN_SESSION</text>
  <text x="1264" y="326" class="badge">사용자 검사 세션</text>
  <text x="1264" y="356" class="field">PK session_id</text>
  <text x="1264" y="380" class="field">FK airline_id, ruleset_id</text>
  <text x="1264" y="404" class="field">flight_number</text>
  <text x="1264" y="428" class="field">departure_at, app_user_ref</text>

  <g filter="url(#shadow)">
    <rect x="1240" y="490" width="260" height="170" rx="24" fill="white"/>
  </g>
  <text x="1264" y="530" class="box-title">USER_SCAN_IMAGE</text>
  <text x="1264" y="558" class="badge">업로드된 수하물 이미지</text>
  <text x="1264" y="588" class="field">PK image_id</text>
  <text x="1264" y="612" class="field">FK session_id</text>
  <text x="1264" y="636" class="field">image_url, uploaded_at</text>

  <g filter="url(#shadow)">
    <rect x="1240" y="702" width="260" height="190" rx="24" fill="white"/>
  </g>
  <text x="1264" y="742" class="box-title">DETECTED_ITEM</text>
  <text x="1264" y="770" class="badge">AI 인식 결과</text>
  <text x="1264" y="800" class="field">PK detected_item_id</text>
  <text x="1264" y="824" class="field">FK session_id, image_id, item_id</text>
  <text x="1264" y="848" class="field">detected_label</text>
  <text x="1264" y="872" class="field">confidence_score, attributes</text>

  <g filter="url(#shadow)">
    <rect x="1240" y="934" width="260" height="170" rx="24" fill="white"/>
  </g>
  <text x="1264" y="974" class="box-title">DETECTION_DECISION</text>
  <text x="1264" y="1002" class="badge">최종 판정 결과</text>
  <text x="1264" y="1032" class="field">PK decision_id</text>
  <text x="1264" y="1056" class="field">FK detected_item_id, policy_id</text>
  <text x="1264" y="1080" class="field">final_action, decision_reason</text>

  <g filter="url(#shadow)">
    <rect x="1540" y="258" width="200" height="132" rx="24" fill="#EDF8FB"/>
  </g>
  <text x="1564" y="298" class="box-title">AIRPORT</text>
  <text x="1564" y="326" class="badge">출도착 공항</text>
  <text x="1564" y="356" class="field">PK airport_id</text>

  <path d="M194 428V470" stroke="#4E7E99" stroke-width="3"/>
  <path d="M194 652V694" stroke="#4E7E99" stroke-width="3"/>
  <path d="M194 884V926" stroke="#4E7E99" stroke-width="3"/>

  <path d="M324 344H640" stroke="#4E7E99" stroke-width="3" stroke-dasharray="8 8"/>
  <path d="M324 560H640" stroke="#4E7E99" stroke-width="3" stroke-dasharray="8 8"/>
  <path d="M324 788H948" stroke="#4E7E99" stroke-width="3"/>

  <path d="M900 561H948" stroke="#4E7E99" stroke-width="3"/>
  <path d="M900 1000C1010 1000 1010 740 948 740" stroke="#4E7E99" stroke-width="3"/>
  <path d="M1208 462H1240" stroke="#4E7E99" stroke-width="3"/>
  <path d="M1370 448V490" stroke="#4E7E99" stroke-width="3"/>
  <path d="M1370 660V702" stroke="#4E7E99" stroke-width="3"/>
  <path d="M1370 892V934" stroke="#4E7E99" stroke-width="3"/>
  <path d="M1500 798C1595 798 1595 324 1540 324" stroke="#4E7E99" stroke-width="3" stroke-dasharray="8 8"/>
  <path d="M324 540C430 540 430 324 640 324" stroke="#4E7E99" stroke-width="3" stroke-dasharray="8 8"/>

  <rect x="1510" y="470" width="230" height="164" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="1534" y="510" class="box-title">발표 포인트</text>
  <text x="1534" y="546" class="small">1. 크롤링 원문과 정규화 규정 분리</text>
  <text x="1534" y="576" class="small">2. 품목과 조건식 기반 판정 구조</text>
  <text x="1534" y="606" class="small">3. 사용자 검사 세션 결과 추적 가능</text>
</svg>
